# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: cc-sesh

before:
  hooks:
    - go mod tidy
    - go generate ./...
    - mkdir -p share/man/man1
    - sh -c "go run . man > share/man/man1/cc-sesh.1"

builds:
  - id: cc-sesh
    binary: cc-sesh
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    ldflags:
      - -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - share/man/man1/cc-sesh.1

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

# Homebrew formula（CLI 二进制）。GoReleaser 在 release 时会把生成的
# Formula 自动 push 到下方 repository 指定的独立 tap 仓库。
# brews 仍是 CLI tool 的正确配置（homebrew_casks 是 GUI 应用专用）。
brews:
  - name: cc-sesh
    homepage: "https://github.com/Wingsdh/cc-sesh"
    description: "sesh fork with built-in Claude Code live status in the picker"
    license: "MIT"
    url_template: "https://github.com/Wingsdh/cc-sesh/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    repository:
      owner: Wingsdh
      name: homebrew-cc-sesh
      branch: main
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    install: |
      bin.install "cc-sesh"
      man1.install "share/man/man1/cc-sesh.1"
    dependencies:
      - tmux
      - zoxide
